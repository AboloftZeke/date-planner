<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Date Planner</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="date.css">
</head>
<body>
	<main class="card" aria-label="Date planner invitation">
		<section class="invite">
			<h1>Hello Allyson</h1>
			<p class="prompt">Would you like to plan a date with me?</p>
			<div class="actions" role="group" aria-label="Response options">
				<button class="choice yes" type="button">Yes</button>
				<button class="choice no" type="button">No</button>
			</div>
		</section>
	</main>
	<script src="date.js"></script>
</body>
</html>
